    SubmitTouhouScoreRequest:
      type: object
      description: |
        Score submission payload emitted by the home page Touhou mini-game.
        `score` is the floored final score, while `validation` is sampled from runtime telemetry.
      required: [score, validation]
      properties:
        score:
          type: integer
          minimum: 0
          description: Final score sent as `Math.floor(currentScore)` at submit time.
        validation:
          type: object
          description: Runtime gameplay telemetry captured during a single run.
          required: [checkpoints, mouseMoves, gameTime, hash]
          properties:
            checkpoints:
              type: array
              description: |
                Starts as `[0]` and appends `Math.floor(elapsed * 0.1)` when
                `elapsed % 1000 < 16` (once per ~1-second rAF window).
                Score rate is 0.1 pts/ms (100 pts/sec), so values are
                roughly `[0, 100, 200, ...]`.
              items:
                type: integer
            mouseMoves:
              type: integer
              minimum: 0
              description: >
                Counter incremented per `requestAnimationFrame` when cursor
                delta exceeds 2px on either axis.
            gameTime:
              type: number
              minimum: 0
              description: >
                Elapsed run duration in milliseconds (`performance.now()` delta),
                sent as a float. Relationship: `score = Math.floor(gameTime * 0.1)`.
            hash:
              type: string
              description: >
                Anti-tamper token refreshed on checkpoint ticks as
                `btoa(`${scoreAtTick}-${rAFTimestamp}-touhou-game-2024`).substring(0, 10)`,
                where `scoreAtTick` is the current score at checkpoint time and
                `rAFTimestamp` is the absolute `requestAnimationFrame` DOMHighResTimeStamp.
          additionalProperties: true
      additionalProperties: false
    SubmitTouhouScoreResponse:
      type: object
      properties:
        success:
          type: boolean
        rank:
          type: integer
        message:
          type: string
      additionalProperties: true
